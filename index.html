<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>WeSocket Server Demo</h1>
    <script>
      const { port } = window.location;
      const connection = new WebSocket(`ws://localhost:${port}`); //creating websocket connection
      connection.onopen = () => {
        connection.send("ping hello from the client...");
        connection.onmessage = (message) => {
          console.log(message); //handle response from server
        };
      };
    </script>
  </body>
</html>
